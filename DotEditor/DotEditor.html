<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ドット絵エディタ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Meiryo',sans-serif;font-size:12px;background:#1a1a1a;color:#ccc;display:flex;flex-direction:column;height:100vh;overflow:hidden;user-select:none}
#menubar{display:flex;align-items:center;background:#2d2d2d;border-bottom:1px solid #444;padding:3px 8px;gap:4px;flex-shrink:0;flex-wrap:wrap;position:relative}
.mbtn{padding:3px 8px;background:none;border:none;color:#ccc;cursor:pointer;border-radius:3px;font-size:12px}
.mbtn:hover{background:#444}
#toolbar{display:flex;align-items:center;background:#222;border-bottom:1px solid #444;padding:3px 6px;gap:4px;flex-wrap:wrap;flex-shrink:0}
.tbtn{width:30px;height:28px;background:#333;border:1px solid #555;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:4px;font-size:14px;color:#bbb;flex-shrink:0;padding:0}
.tbtn.on{background:#4a5a8a;border-color:#7af;color:#fff}
.tbtn:hover:not(.on){background:#3a3a3a}
.sep{width:1px;height:22px;background:#555;margin:0 2px;flex-shrink:0}
#main{display:flex;flex:1;overflow:hidden;min-height:0}
#lpanel{width:168px;min-width:168px;background:#222;border-right:1px solid #444;display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
#cvarea{flex:1;overflow:auto;background:#111;padding:20px;cursor:crosshair}
#cvwrap{position:relative;display:inline-block}
#mc{display:block;image-rendering:pixelated;image-rendering:crisp-edges}
#oc{position:absolute;top:0;left:0;pointer-events:none;image-rendering:pixelated;image-rendering:crisp-edges}
#rpanel{width:204px;min-width:204px;background:#222;border-left:1px solid #444;display:flex;flex-direction:column;flex-shrink:0}
#sbar{background:#2d2d2d;border-top:1px solid #444;padding:2px 8px;font-size:10px;color:#888;display:flex;gap:10px;flex-shrink:0;flex-wrap:wrap}
.ph{display:flex;justify-content:space-between;align-items:center;padding:4px 7px;background:#2a2a2a;font-size:10px;font-weight:bold;color:#999;border-bottom:1px solid #444;flex-shrink:0}
.ph button{background:#333;border:1px solid #555;color:#aaa;padding:1px 5px;cursor:pointer;border-radius:2px;font-size:10px}
.ph button:hover{background:#444}
.ps{padding:7px}
#cs{position:relative;width:58px;height:50px;margin-bottom:6px}
#bgb{position:absolute;right:0;bottom:0;width:32px;height:32px;border:2px solid #666;cursor:pointer;border-radius:2px}
#fgb{position:absolute;left:0;top:0;width:32px;height:32px;border:2px solid #ddd;cursor:pointer;border-radius:2px;z-index:1}
.swp{position:absolute;right:0;top:0;width:14px;height:14px;background:#3a3a3a;border:1px solid #666;cursor:pointer;border-radius:2px;font-size:9px;color:#aaa;display:flex;align-items:center;justify-content:center;z-index:2;line-height:1}
.pgrid{display:grid;gap:1px}
.pc{cursor:pointer;border:1px solid transparent;aspect-ratio:1}
.pc:hover{outline:1px solid #fff}
input[type=number]{background:#333;border:1px solid #555;color:#ddd;border-radius:3px;padding:2px 4px;width:48px;font-size:11px}
input[type=range]{flex:1;height:14px}
input[type=text]{background:#333;border:1px solid #555;color:#ddd;border-radius:3px;padding:2px 4px;width:100%;font-size:11px}
textarea{background:#2a2a2a;border:1px solid #555;color:#ddd;border-radius:3px;padding:4px;font-size:12px;resize:vertical;width:100%;line-height:1.5;font-family:'Hiragino Sans','Meiryo',sans-serif}
select{background:#333;border:1px solid #555;color:#ddd;border-radius:3px;padding:2px 4px;font-size:11px;cursor:pointer}
.or{display:flex;align-items:center;gap:5px;margin-bottom:4px;font-size:11px}
.ol{color:#888;min-width:52px;font-size:10px;flex-shrink:0}
#layers{flex:1;overflow-y:auto;min-height:0}
.li{display:flex;align-items:center;padding:3px 6px;border-bottom:1px solid #333;cursor:pointer;gap:4px}
.li.on{background:#3a3a5a}
.li:hover:not(.on){background:#2a2a2a}
.lth{width:28px;height:28px;border:1px solid #555;image-rendering:pixelated;flex-shrink:0;background:repeating-conic-gradient(#555 0% 25%,#333 0% 50%) 0 0/6px 6px}
.ln{flex:1;font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lic{cursor:pointer;font-size:11px;flex-shrink:0;line-height:1;opacity:0.75}
.lic:hover{opacity:1}
#settingsdlg{display:none;position:absolute;top:100%;right:0;background:#2a2a2a;border:1px solid #555;border-radius:6px;padding:10px;z-index:200;min-width:220px;box-shadow:0 4px 16px rgba(0,0,0,0.6)}
sbtn{display:block;width:100%;margin-top:6px;background:#3a3a3a;border:1px solid #555;color:#ccc;padding:4px;cursor:pointer;border-radius:3px;font-size:11px;text-align:center}
.pc{cursor:pointer;border:1px solid transparent;aspect-ratio:1;position:relative}
.pc:hover{outline:2px solid #fff;z-index:1}
.pc.drag-over{outline:2px solid #7af;z-index:2}
.pc.dragging{opacity:0.4}
.pc.pal-sel{outline:2px solid #fff !important;z-index:2;}
.pc.pal-swap{outline:2px solid #fa8 !important;z-index:3;}
.pc.pal-hover{outline:2px solid #8af !important;z-index:5;}
.pop{padding:2px 6px;background:#333;border:1px solid #555;color:#ccc;cursor:pointer;border-radius:3px;font-size:10px;line-height:1.4}
.pop:hover{background:#444}
.pop.on{background:#4a5a8a;border-color:#7af;color:#fff}

body.fullcv #toolbar{display:none}
body.fullcv #main>*:not(#cvcolumn){display:none!important}
body.fullcv #framebar{display:none!important}
body.fullcv #cvarea{padding:0;width:100%;box-sizing:border-box}
body.fullcv #cvcolumn{width:100%;min-width:0;display:flex;flex-direction:column}
body.fullcv #menubar>*:not(#fullcvbtn){display:none}
body.fullcv #menubar{justify-content:flex-end}
body.fullcv #fullcvbtn{display:flex!important}
/* 全画面下部パレットバー */
#fullcv-bar{display:none;flex-shrink:0;background:#222;border-top:1px solid #444;padding:4px 6px;gap:6px;align-items:flex-start;overflow-x:auto}
body.fullcv #fullcv-bar{display:flex}
/* fullcv内ナビゲーターをコンパクトに */
#fcv-navsec-slot #navsec{border:none}
#fcv-navsec-slot #navsec>div{max-height:80px!important;overflow:hidden!important;padding:2px!important}
#fcv-navsec-slot #navsec .ph{padding:2px 5px!important}
#fcv-navsec-slot #navc{max-width:155px!important;max-height:76px!important}
</style>
</head>
<body>

<div id="menubar">
  <button class="mbtn" onclick="doNew()">新規</button>
  <button class="mbtn" onclick="doResize()">リサイズ</button>
  <button class="mbtn" onclick="doExport()">PNG書出</button>
  <button class="mbtn" onclick="doExportGIF()">GIF書出</button>
  <div class="sep" style="height:18px;margin:0 3px"></div>
  <button class="mbtn" onclick="doSaveProject()">💾 保存</button>
  <button class="mbtn" onclick="document.getElementById('projload').click()">📂 読込</button>
  <input type="file" id="projload" accept=".dotpix,.json" style="display:none" onchange="doLoadProject(this)">
  <div class="sep" style="height:18px;margin:0 3px"></div>
  <button class="mbtn" onclick="doCopy()">コピー</button>
  <button class="mbtn" onclick="doCut()">切り取り</button>
  <button class="mbtn" onclick="doPaste()">貼り付け</button>
  <div style="flex:1"></div>
  <button class="mbtn" id="fullcvbtn" onclick="toggleFullCanvas()" title="キャンバスのみ表示" style="background:#2a2a3a;border:1px solid #4a4a7a;color:#aaf;border-radius:3px">全表示</button>
  <label style="font-size:10px;color:#888">W:</label>
  <input type="number" id="wi" value="32" min="1" max="1024" style="width:48px">
  <label style="font-size:10px;color:#888">H:</label>
  <input type="number" id="hi" value="32" min="1" max="1024" style="width:48px">
  <select id="cmsel" onchange="changeColorMode(this.value)" style="margin-left:6px">
    <option value="full">フルカラー</option>
    <option value="65535">65535色</option>
    <option value="256" selected>256色パレット</option>
    <option value="16">16色パレット</option>
  </select>
  <div style="position:relative">
    <button class="mbtn" id="setbtn" onclick="toggleSettings(event)">⚙ 設定</button>
    <div id="settingsdlg">
      <div style="font-size:11px;font-weight:bold;color:#bbb;margin-bottom:8px">マウスボタン割り当て</div>
      <div class="or"><span class="ol" style="min-width:60px">左ボタン</span>
        <select id="btn0" style="flex:1" onchange="A.btnMap[0]=this.value">
          <option value="draw">描画（描画色）</option><option value="erase">消しゴム</option>
          <option value="bg">描画（背景色）</option><option value="eyedrop">スポイト</option>
        </select></div>
      <div class="or"><span class="ol" style="min-width:60px">中ボタン</span>
        <select id="btn1" style="flex:1" onchange="A.btnMap[1]=this.value">
          <option value="erase" selected>消しゴム</option><option value="draw">描画（描画色）</option>
          <option value="bg">描画（背景色）</option><option value="eyedrop">スポイト</option>
        </select></div>
      <div class="or"><span class="ol" style="min-width:60px">右ボタン</span>
        <select id="btn2" style="flex:1" onchange="A.btnMap[2]=this.value">
          <option value="bg">描画（背景色）</option><option value="draw">描画（描画色）</option>
          <option value="erase">消しゴム</option><option value="eyedrop">スポイト</option>
        </select></div>
      <button onclick="toggleSettings(event)" style="width:100%;margin-top:8px;background:#444;border:1px solid #666;color:#ccc;padding:3px;cursor:pointer;border-radius:3px;font-size:11px">閉じる</button>
    </div>
  </div>
</div>

<div id="toolbar">
  <button class="tbtn on" id="tb-pencil" onclick="setTool('pencil')" title="鉛筆 P">✏</button>
  <button class="tbtn" id="tb-eraser" onclick="setTool('eraser')" title="消しゴム E">◻</button>
  <button class="tbtn" id="tb-fill"   onclick="setTool('fill')"   title="塗りつぶし F">⬛</button>
  <div class="sep"></div>
  <button class="tbtn" id="tb-line"   onclick="setTool('line')"   title="ライン L">╱</button>
  <button class="tbtn" id="tb-rect"   onclick="setTool('rect')"   title="矩形 R">▭</button>
  <button class="tbtn" id="tb-circle" onclick="setTool('circle')" title="円/楕円 C">○</button>
  <button class="tbtn" id="tb-grad"   onclick="setTool('grad')"   title="グラデーション G">▓</button>
  <div class="sep"></div>
  <button class="tbtn" id="tb-sel"    onclick="setTool('sel')"    title="選択 S">⬚</button>
  <button class="tbtn" id="tb-move"   onclick="setTool('move')"   title="移動 V">✛</button>
  <button class="tbtn" id="tb-text"   onclick="setTool('text')"   title="テキスト T">文</button>
  <div class="sep"></div>
  <button class="tbtn" onclick="changeZoom(-1)" title="縮小（ホイール）">－</button>
  <span id="zlbl" style="color:#888;font-size:10px;min-width:28px;text-align:center">8x</span>
  <button class="tbtn" onclick="changeZoom(1)"  title="拡大（ホイール）">＋</button>
  <div class="sep"></div>
  <button class="tbtn on" id="tb-grid" onclick="toggleGrid()" title="グリッド">⊞</button>
  <div class="sep"></div>
  <button class="tbtn" onclick="doUndo()" title="元に戻す Ctrl+Z">↩</button>
  <button class="tbtn" onclick="doRedo()" title="やり直し Ctrl+Y">↪</button>
</div>

<div id="main">
  <div id="lpanel">
    <div style="border-bottom:1px solid #444;flex-shrink:0">
      <div class="ph">カラー</div>
      <div class="ps">
        <div id="cs">
          <div id="bgb" title="背景色" onclick="pickBg()"></div>
          <div id="fgb" title="描画色" onclick="pickFg()"></div>
          <div class="swp" onclick="swapColors()" title="入替">⇄</div>
        </div>
        <input type="color" id="fgp" style="display:none" oninput="setFg(this.value)">
        <input type="color" id="bgp" style="display:none" oninput="setBg(this.value)">
        <div style="font-size:9px;color:#888;margin-bottom:2px">描画色</div>
        <input type="text" id="fghex" value="#000000" onchange="setFg(this.value)" style="width:82px;font-family:monospace">
        <div style="font-size:9px;color:#888;margin-top:4px;margin-bottom:2px">背景色</div>
        <input type="text" id="bghex" value="#ffffff" onchange="setBg(this.value)" style="width:82px;font-family:monospace">
      </div>
    </div>
    <div id="palsec" style="border-bottom:1px solid #444;flex-shrink:0">
      <div class="ph">パレット <span id="palinfo">256色</span>
        <div style="display:flex;gap:2px;align-items:center">
          <button id="palfollowbtn" onclick="togglePalFollow()" title="移動・入替時にピクセルも追従させる" style="padding:1px 4px;border-radius:2px;cursor:pointer;font-size:9px;background:#3a5a3a;border:1px solid #5a9a5a;color:#8f8">追従ON</button>
          <button onclick="savePalette()" title="パレット保存">💾</button>
          <button onclick="document.getElementById('palload').click()" title="パレット読込">📂</button>
        </div>
      </div>
      <input type="file" id="palload" accept=".json,.pal" style="display:none" onchange="loadPalette(this)">
      <div style="padding:4px"><div class="pgrid" id="pgrid"></div></div>
      <div id="palops" style="display:none;padding:4px 5px;background:#1c1c2c;border-top:1px solid #333;flex-wrap:wrap;gap:3px;align-items:center">
        <button class="pop" onclick="palGradient()" title="選択範囲の端2色でグラデーション生成">グラデ</button>
        <button class="pop" onclick="palInvert()" title="選択範囲の色を反転">反転</button>
        <button class="pop" id="palmovebtn" onclick="togglePalSwapMode()" title="選択範囲と別の範囲を入れ替え">差し替え</button>
        <span id="palmovehint" style="font-size:9px;color:#fa8;display:none">入替先をクリック</span>
        <button class="pop" onclick="clearPalSel()">✕解除</button>
      </div>
    </div>
    <div style="border-bottom:1px solid #444;flex-shrink:0">
      <div class="ph">ツールオプション</div>
      <div style="padding:6px 7px" id="topts"></div>
    </div>
  </div>

  <div id="cvcolumn" style="flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden">
  <div id="cvarea">
    <div id="cvwrap">
      <canvas id="mc"></canvas>
      <canvas id="oc"></canvas>
    </div>
  </div>
  <!-- 全画面下部バー -->
  <div id="fullcv-bar">
    <div style="display:flex;flex-direction:column;gap:3px;flex-shrink:0;min-width:160px">
      <div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap">
        <div style="position:relative;width:36px;height:36px;flex-shrink:0">
          <div id="fcv-bgb" style="position:absolute;left:10px;top:10px;width:22px;height:22px;border:2px solid #888;cursor:pointer;box-sizing:border-box" title="背景色" onclick="pickBg()"></div>
          <div id="fcv-fgb" style="position:absolute;left:0;top:0;width:22px;height:22px;border:2px solid #fff;cursor:pointer;box-sizing:border-box" title="描画色" onclick="pickFg()"></div>
        </div>
        <div id="fcv-toggle" onclick="toggleDrawColor()" title="描画色/背景色 切替" style="cursor:pointer;font-size:18px;line-height:1;color:#fff;padding:2px 4px;border:1px solid #555;border-radius:3px;background:#333">✏</div>
        <button class="mbtn" onclick="doExport()" style="font-size:10px;padding:2px 5px">PNG書出</button>
        <button class="mbtn" onclick="document.getElementById('fcv-imgload').click()" style="font-size:10px;padding:2px 5px">読込</button>
        <input type="file" id="fcv-imgload" accept="image/*" style="display:none" onchange="loadImageToLayer(this)">
      </div>
      <div id="fcv-navsec-slot"></div>
    </div>
    <div id="fcv-pgrid" style="flex-shrink:0;align-self:flex-start"></div>
  </div>
  <!-- フレームバー -->
  <div id="framebar" style="background:#1e1e1e;border-top:1px solid #444;flex-shrink:0;display:flex;align-items:stretch;min-height:0">
    <!-- コントロール -->
    <div style="display:flex;flex-direction:column;justify-content:center;gap:4px;padding:4px 6px;border-right:1px solid #444;flex-shrink:0">
      <div style="display:flex;gap:2px">
        <button onclick="addFrame()" class="tbtn" title="フレーム追加" style="width:24px;height:22px;font-size:12px">＋</button>
        <button onclick="delFrame()" class="tbtn" title="フレーム削除" style="width:24px;height:22px;font-size:12px">－</button>
        <button onclick="dupFrame()" class="tbtn" title="複製" style="width:24px;height:22px;font-size:11px">⧉</button>
      </div>
      <button id="playbtn" onclick="togglePlay()" class="tbtn" title="再生/停止" style="width:52px;height:22px;font-size:13px">▶ 再生</button>
      <div style="font-size:9px;color:#666;text-align:center">ms/frame</div>
    </div>
    <!-- フレームリスト -->
    <div id="framelist" style="display:flex;gap:4px;padding:4px;overflow-x:auto;align-items:flex-start;flex:1"></div>
  </div>
  </div>

  <div id="rpanel">
    <!-- Navigator -->
    <div id="navsec" style="flex-shrink:0;border-bottom:1px solid #444">
      <div class="ph">ナビゲーター
        <select id="navzoom" onchange="updateNav()" style="font-size:9px;padding:1px 3px">
          <option value="1">100%</option>
          <option value="2">200%</option>
        </select>
      </div>
      <div style="padding:4px;overflow:auto;max-height:160px;background:repeating-conic-gradient(#3a3a3a 0% 25%,#222 0% 50%) 0 0/8px 8px">
        <canvas id="navc" style="image-rendering:pixelated;image-rendering:crisp-edges;display:block;max-width:100%"></canvas>
      </div>
    </div>
    <!-- Layers -->
    <div class="ph">レイヤー
      <div style="display:flex;gap:2px">
        <button onclick="addLayer()">＋</button>
        <button onclick="delLayer()">－</button>
        <button onclick="dupLayer()">⧉</button>
        <button onclick="mergeDn()">↧</button>
      </div>
    </div>
    <div id="layers"></div>
    <div style="padding:6px 8px;border-top:1px solid #444;flex-shrink:0">
      <div class="or">
        <span class="ol">合成</span>
        <select id="lblend" onchange="setLayerBlend(this.value)" style="flex:1;font-size:10px">
          <option value="normal">通常</option>
          <option value="multiply">乗算</option>
          <option value="screen">スクリーン</option>
          <option value="add">加算</option>
        </select>
      </div>
      <div class="or" style="margin-top:2px">
        <span class="ol">不透明度</span>
        <input type="range" id="lopac" min="0" max="100" value="100" oninput="setLayerOp(this.value)">
        <span id="lopacv" style="font-size:10px;min-width:28px">100%</span>
      </div>
      <div class="or" style="margin-top:4px">
        <span class="ol">マスク</span>
        <button onclick="addMask()" style="background:#333;border:1px solid #555;color:#ccc;padding:2px 4px;cursor:pointer;border-radius:2px;font-size:10px">追加</button>
        <button onclick="applyMask()" style="background:#333;border:1px solid #555;color:#ccc;padding:2px 4px;cursor:pointer;border-radius:2px;font-size:10px">適用</button>
        <button onclick="editMask()" id="maskbtn" style="background:#333;border:1px solid #555;color:#ccc;padding:2px 4px;cursor:pointer;border-radius:2px;font-size:10px">編集</button>
      </div>
    </div>
  </div>
</div>

<div id="sbar">
  <span id="spos">X:- Y:-</span>
  <span id="scol">色:-</span>
  <span id="ssz">32×32</span>
  <span id="szm">8x</span>
  <span id="slyr">レイヤー:背景</span>
  <span id="sbsz" style="color:#8af">ブラシ:1px</span>
  <span id="smask" style="color:#f88;display:none">🎭マスク編集中</span>
</div>

<!-- パレット編集用：カーソル位置に表示するカラーピッカー -->
<input type="color" id="paledit" style="position:fixed;left:0;top:0;opacity:0;width:1px;height:1px;pointer-events:none;border:none;padding:0">

<script>
const A={
  w:64,h:64,zoom:8,tool:'pencil',
  fg:'#000000',bg:'#ffffff',cm:'256',grid:true,
  layers:[],al:0,editMask:false,
  drawing:false,sx:0,sy:0,lx:0,ly:0,
  sel:null,float:null,selMoving:false,selOX:0,selOY:0,
  gradTile:false,brushSize:1,
  btnMap:{0:'draw',1:'erase',2:'bg'},
  lyrMoving:false,lyrDX:0,lyrDY:0,
  frames:[],frameIdx:0,playing:false,
  hist:[],hidx:-1
};
let clipboard=null;
let palEditIdx=-1;
let PAL_SEL=null;
let PAL_PIXEL_FOLLOW=true;
let palMoveMode=false;
let palMouseDown=false;
let palMouseDownIdx=-1;
let palMouseMoved=false;
let palHoverIdx=-1;
let palMiddleDrag=false;
let palMiddleDragTarget=-1;
let palSwapSel=null;

// パレット編集用カラーピッカー
let _palPrevHex=''; // ライブ編集前の色を保持
function onPalEditInput(newHex){
  // inputイベント：リアルタイムプレビュー（履歴なし）
  if(palEditIdx<0)return;
  const oldHex=_palPrevHex||r2h(...PAL[palEditIdx]);
  if(oldHex===newHex)return;
  const[nr,ng,nb]=h2r(newHex);
  PAL[palEditIdx]=[nr,ng,nb];
  replacePalColorNoHist(oldHex,newHex);
  _palPrevHex=newHex;// 次のinputのためにoldを更新
  buildPalUI();
}
function onPalEditChange(newHex){
  // changeイベント：確定（履歴に積む）
  if(palEditIdx<0)return;
  if(_palPrevHex===newHex){_palPrevHex='';return;}
  pushHist();
  _palPrevHex='';
}
document.getElementById('paledit').addEventListener('input', function(){
  if(_palPrevHex==='')_palPrevHex=r2h(...PAL[palEditIdx]);// 開始時に旧色を保存
  onPalEditInput(this.value);
});
document.getElementById('paledit').addEventListener('change',function(){onPalEditChange(this.value);});

// ===== Palette =====
function mkPal256(){
  const p=[];
  for(let r=0;r<=5;r++)for(let g=0;g<=5;g++)for(let b=0;b<=5;b++)p.push([r*51,g*51,b*51]);
  for(let i=0;i<24;i++){const v=Math.round(i*10.9);p.push([v,v,v]);}
  while(p.length<256)p.push([0,0,0]);
  return p.slice(0,256);
}
function mkPal16(){
  return[[0,0,0],[128,0,0],[0,128,0],[128,128,0],[0,0,128],[128,0,128],[0,128,128],[192,192,192],
         [128,128,128],[255,0,0],[0,255,0],[255,255,0],[0,0,255],[255,0,255],[0,255,255],[255,255,255]];
}
let PAL=mkPal256();

// ===== 全表示 =====
function updateFullcvBar(){
  const fcvPg=document.getElementById('fcv-pgrid');
  if(!fcvPg)return;
  fcvPg.innerHTML='';
  if(A.cm==='256'||A.cm==='16'){
    fcvPg.style.cssText='display:grid;grid-template-columns:repeat(16,11px);gap:0;flex-shrink:0';
    PAL.forEach(([r,gr,b])=>{
      const hex=r2h(r,gr,b);
      const c=document.createElement('div');
      c.style.cssText=`width:11px;height:11px;background:${hex};cursor:pointer;outline:1px solid #0003`;
      c.onclick=()=>setFg(hex);
      c.oncontextmenu=e=>{e.preventDefault();setBg(hex);};
      fcvPg.appendChild(c);
    });
  } else {
    fcvPg.style.cssText='display:none';
  }
  const fcvFg=document.getElementById('fcv-fgb');
  const fcvBg=document.getElementById('fcv-bgb');
  if(fcvFg)fcvFg.style.background=A.fg;
  if(fcvBg)fcvBg.style.background=A.bg;
}
let _drawWithBg=false;
function toggleDrawColor(){
  _drawWithBg=!_drawWithBg;
  const btn=document.getElementById('fcv-toggle');
  if(btn){btn.textContent=_drawWithBg?'🔲':'✏';btn.style.color=_drawWithBg?'#fa8':'#fff';}
  A.btnMap[0]=_drawWithBg?'bg':'draw';
}
function loadImageToLayer(input){
  const f=input.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const l=A.layers[A.al];
      l.ctx.clearRect(0,0,A.w,A.h);
      l.ctx.drawImage(img,0,0,A.w,A.h);
      renderAll();pushHist();updateFrameThumb();refreshLayers();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(f);
  input.value='';
}
function toggleFullCanvas(){
  const on=document.body.classList.toggle('fullcv');
  const btn=document.getElementById('fullcvbtn');
  btn.textContent=on?'戻す':'全表示';
  btn.style.background=on?'#3a3a5a':'#2a2a3a';
  btn.style.borderColor=on?'#7a7aff':'#4a4a7a';
  if(on){
    A.zoom=Math.max(1,Math.floor(window.innerWidth/A.w));
    // navsecをfullcv-barに移動
    const slot=document.getElementById('fcv-navsec-slot');
    const ns=document.getElementById('navsec');
    if(slot&&ns)slot.appendChild(ns);
    updateFullcvBar();
  } else {
    A.zoom=8;
    // navsecをrpanelの先頭に戻す
    const ns=document.getElementById('navsec');
    const rp=document.getElementById('rpanel');
    if(ns&&rp)rp.insertBefore(ns,rp.firstChild);
  }
  setTimeout(()=>{updateNav();initCV();},50);
}

function initCV(){
  const z=A.zoom,w=A.w,h=A.h;
  mc.width=w*z;mc.height=h*z;oc.width=w*z;oc.height=h*z;
  mctx.imageSmoothingEnabled=false;octx.imageSmoothingEnabled=false;
  document.getElementById('ssz').textContent=w+'×'+h;
  document.getElementById('szm').textContent=z+'x';
  document.getElementById('zlbl').textContent=z+'x';

// ===== Layers =====
function mkLayer(name){
  const c=document.createElement('canvas');c.width=A.w;c.height=A.h;
  return{name,canvas:c,ctx:c.getContext('2d'),vis:true,locked:false,opacity:1,mask:null,blendMode:'normal'};
}
function addLayer(name){
  name=name||'レイヤー'+(A.layers.length+1);
  const l=mkLayer(name);A.layers.splice(A.al+1,0,l);A.al++;
  refreshLayers();renderAll();
}
function delLayer(){
  if(A.layers.length<=1)return;
  A.layers.splice(A.al,1);A.al=Math.min(A.al,A.layers.length-1);
  refreshLayers();renderAll();
}
function dupLayer(){
  const s=A.layers[A.al];const d=mkLayer(s.name+' コピー');
  d.ctx.drawImage(s.canvas,0,0);d.vis=s.vis;d.opacity=s.opacity;d.blendMode=s.blendMode||'normal';
  A.layers.splice(A.al+1,0,d);A.al++;refreshLayers();renderAll();
}
function mergeDn(){
  if(A.al===0)return;
  const top=A.layers[A.al],bot=A.layers[A.al-1];
  bot.ctx.save();bot.ctx.globalAlpha=top.opacity;bot.ctx.drawImage(top.canvas,0,0);bot.ctx.restore();
  A.layers.splice(A.al,1);A.al--;refreshLayers();renderAll();
}
function setLayerOp(v){A.layers[A.al].opacity=v/100;document.getElementById('lopacv').textContent=v+'%';renderAll();}
function setLayerBlend(v){A.layers[A.al].blendMode=v;renderAll();}
function addMask(){
  const l=A.layers[A.al];if(l.mask)return;
  const c=document.createElement('canvas');c.width=A.w;c.height=A.h;
  c.getContext('2d').fillStyle='white';c.getContext('2d').fillRect(0,0,A.w,A.h);
  l.mask=c;refreshLayers();renderAll();
}
function applyMask(){
  const l=A.layers[A.al];if(!l.mask)return;
  const md=l.mask.getContext('2d').getImageData(0,0,A.w,A.h);
  const ld=l.ctx.getImageData(0,0,A.w,A.h);
  for(let i=0;i<A.w*A.h;i++)ld.data[i*4+3]=Math.round(ld.data[i*4+3]*md.data[i*4]/255);
  l.ctx.putImageData(ld,0,0);l.mask=null;A.editMask=false;
  document.getElementById('smask').style.display='none';refreshLayers();renderAll();
}
function editMask(){
  const l=A.layers[A.al];
  if(!l.mask){alert('マスクがありません。先に「追加」してください。');return;}
  A.editMask=!A.editMask;
  document.getElementById('smask').style.display=A.editMask?'':'none';
  document.getElementById('maskbtn').textContent=A.editMask?'レイヤー':'編集';
}

// ===== Navigator =====
function updateNav(){
  const nc=document.getElementById('navc');
  const scale=parseInt(document.getElementById('navzoom')?.value||1);
  nc.width=A.w*scale;nc.height=A.h*scale;
  const nx=nc.getContext('2d');nx.imageSmoothingEnabled=false;
  nx.clearRect(0,0,nc.width,nc.height);
  A.layers.forEach(l=>{
    if(!l.vis)return;nx.save();nx.globalAlpha=l.opacity;
    const bm=l.blendMode||'normal';
    nx.globalCompositeOperation=bm==='add'?'lighter':bm==='screen'?'screen':bm==='multiply'?'multiply':'source-over';
    if(l.mask){
      const t=document.createElement('canvas');t.width=A.w;t.height=A.h;
      const tx=t.getContext('2d');tx.drawImage(l.canvas,0,0);
      tx.globalCompositeOperation='destination-in';tx.drawImage(l.mask,0,0);
      nx.drawImage(t,0,0,nc.width,nc.height);
    } else nx.drawImage(l.canvas,0,0,nc.width,nc.height);
    nx.restore();
  });
}

// ===== Render =====
function renderAll(){
  const z=A.zoom,w=A.w,h=A.h,cw=w*z,ch=h*z;
  mctx.clearRect(0,0,cw,ch);
  const sz=Math.max(4,Math.min(16,z));
  mctx.fillStyle='#999';mctx.fillRect(0,0,cw,ch);
  mctx.fillStyle='#ddd';
  for(let y=0;y<ch;y+=sz*2)for(let x=0;x<cw;x+=sz*2){mctx.fillRect(x,y,sz,sz);mctx.fillRect(x+sz,y+sz,sz,sz);}
  for(let i=0;i<A.layers.length;i++){
    const l=A.layers[i];if(!l.vis)continue;
    mctx.save();
    mctx.globalAlpha=l.opacity;
    mctx.imageSmoothingEnabled=false;
    // ブレンドモード適用
    const bm=l.blendMode||'normal';
    mctx.globalCompositeOperation=
      bm==='add'?'lighter':
      bm==='screen'?'screen':
      bm==='multiply'?'multiply':
      'source-over';
    // レイヤー移動中はアクティブレイヤーにオフセットを適用
    const ox=(A.lyrMoving&&i===A.al)?A.lyrDX*z:0;
    const oy=(A.lyrMoving&&i===A.al)?A.lyrDY*z:0;
    if(l.mask){
      const t=document.createElement('canvas');t.width=A.w;t.height=A.h;
      const tx=t.getContext('2d');tx.drawImage(l.canvas,0,0);tx.globalCompositeOperation='destination-in';tx.drawImage(l.mask,0,0);
      mctx.drawImage(t,ox,oy,cw,ch);
    } else mctx.drawImage(l.canvas,ox,oy,cw,ch);
    mctx.restore();
  }
  if(A.float){
    const t=document.createElement('canvas');t.width=A.float.data.width;t.height=A.float.data.height;
    t.getContext('2d').putImageData(A.float.data,0,0);
    mctx.imageSmoothingEnabled=false;
    mctx.drawImage(t,A.float.x*z,A.float.y*z,A.float.data.width*z,A.float.data.height*z);
  }
  if(A.grid&&z>=3){
    mctx.strokeStyle='rgba(128,128,128,0.25)';mctx.lineWidth=0.5;mctx.beginPath();
    for(let x=0;x<=w;x++){mctx.moveTo(x*z,0);mctx.lineTo(x*z,ch);}
    for(let y=0;y<=h;y++){mctx.moveTo(0,y*z);mctx.lineTo(cw,y*z);}
    mctx.stroke();
  }
  drawOverlay();updateThumbs();updateNav();updateFrameThumb();
}
function drawOverlay(){
  const z=A.zoom,cw=A.w*z,ch=A.h*z;octx.clearRect(0,0,cw,ch);
  if(A.sel){
    const{x,y,w,h}=A.sel,t=Date.now()/80;
    octx.lineWidth=1;octx.strokeStyle='#fff';octx.setLineDash([4,4]);octx.lineDashOffset=-t%8;
    octx.strokeRect(x*z+0.5,y*z+0.5,w*z,h*z);
    octx.strokeStyle='#000';octx.lineDashOffset=(-t+4)%8;octx.strokeRect(x*z+0.5,y*z+0.5,w*z,h*z);
    octx.setLineDash([]);octx.fillStyle='#fff';
    [[x*z,y*z],[x*z+w*z/2,y*z],[x*z+w*z,y*z],[x*z,y*z+h*z/2],[x*z+w*z,y*z+h*z/2],
     [x*z,y*z+h*z],[x*z+w*z/2,y*z+h*z],[x*z+w*z,y*z+h*z]].forEach(([hx,hy])=>{
      octx.fillRect(hx-3,hy-3,6,6);octx.strokeStyle='#444';octx.lineWidth=0.5;octx.strokeRect(hx-3,hy-3,6,6);
    });
  }
}
(function animLoop(){drawOverlay();requestAnimationFrame(animLoop);})();

// ===== Pixel Ops =====
function h2r(h){h=h.replace('#','');if(h.length===3)h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function r2h(r,g,b){return'#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('');}
function qColor(hex){
  if(A.cm==='full')return hex;
  const[r,g,b]=h2r(hex);
  if(A.cm==='65535')return r2h(Math.round(r/8)*8,Math.round(g/4)*4,Math.round(b/8)*8);
  let best=0,bd=1e9;
  PAL.forEach(([pr,pg,pb],i)=>{const d=(r-pr)**2+(g-pg)**2+(b-pb)**2;if(d<bd){bd=d;best=i;}});
  return r2h(...PAL[best]);
}
function inCV(x,y){return x>=0&&x<A.w&&y>=0&&y<A.h;}
function inSel(x,y){if(!A.sel)return true;return x>=A.sel.x&&x<A.sel.x+A.sel.w&&y>=A.sel.y&&y<A.sel.y+A.sel.h;}
function getCtx(){const l=A.layers[A.al];return A.editMask&&l.mask?l.mask.getContext('2d'):l.ctx;}
function spc(ctx,x,y,col){
  if(!inCV(x,y)||!inSel(x,y))return;
  const[r,g,b]=h2r(col);const d=ctx.getImageData(x,y,1,1);
  d.data[0]=r;d.data[1]=g;d.data[2]=b;d.data[3]=255;ctx.putImageData(d,x,y);
}
function epc(ctx,x,y){if(!inCV(x,y)||!inSel(x,y))return;ctx.clearRect(x,y,1,1);}
function gpc(ctx,x,y){if(!inCV(x,y))return'#000';const d=ctx.getImageData(x,y,1,1).data;return r2h(d[0],d[1],d[2]);}
function brush(ctx,cx,cy,col,erase){
  const hs=Math.floor((A.brushSize-1)/2);
  for(let dy=-hs;dy<=hs;dy++)for(let dx=-hs;dx<=hs;dx++){if(erase)epc(ctx,cx+dx,cy+dy);else spc(ctx,cx+dx,cy+dy,col);}
}
function bline(ctx,x0,y0,x1,y1,col,erase){
  const dx=Math.abs(x1-x0),dy=Math.abs(y1-y0),sx=x0<x1?1:-1,sy=y0<y1?1:-1;let err=dx-dy;
  for(;;){brush(ctx,x0,y0,col,erase);if(x0===x1&&y0===y1)break;const e2=2*err;if(e2>-dy){err-=dy;x0+=sx;}if(e2<dx){err+=dx;y0+=sy;}}
}
function floodFill(ctx,sx,sy,col){
  const id=ctx.getImageData(0,0,A.w,A.h),d=id.data,i=(sy*A.w+sx)*4;
  const[tr,tg,tb,ta]=[d[i],d[i+1],d[i+2],d[i+3]];const[fr,fg,fb]=h2r(col);
  if(tr===fr&&tg===fg&&tb===fb&&ta===255)return;
  const stack=[[sx,sy]],vis=new Uint8Array(A.w*A.h);
  while(stack.length){
    const[x,y]=stack.pop();if(!inCV(x,y)||!inSel(x,y))continue;
    const ii=y*A.w+x;if(vis[ii])continue;vis[ii]=1;const pi=ii*4;
    if(Math.abs(d[pi]-tr)+Math.abs(d[pi+1]-tg)+Math.abs(d[pi+2]-tb)+Math.abs(d[pi+3]-ta)>120)continue;
    d[pi]=fr;d[pi+1]=fg;d[pi+2]=fb;d[pi+3]=255;
    stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
  }
  ctx.putImageData(id,0,0);
}
function fillCircle(ctx,cx,cy,rx,ry,col,filled){
  if(rx<=0||ry<=0)return;
  if(filled){for(let dy=-ry;dy<=ry;dy++){const hw=rx*Math.sqrt(1-(dy/ry)**2);for(let dx=-Math.round(hw);dx<=Math.round(hw);dx++)spc(ctx,cx+dx,cy+dy,col);}}
  else{
    const plot=(x,y)=>spc(ctx,x,y,col);let x=0,y=ry,d1=ry*ry-rx*rx*ry+.25*rx*rx,dx2=0,dy2=2*rx*rx*y;
    while(dx2<dy2){[plot(cx+x,cy+y),plot(cx-x,cy+y),plot(cx+x,cy-y),plot(cx-x,cy-y)];
      if(d1<0){x++;dx2+=2*ry*ry;d1+=dx2+ry*ry;}else{x++;y--;dx2+=2*ry*ry;dy2-=2*rx*rx;d1+=dx2-dy2+ry*ry;}}
    let d2=ry*ry*(x+.5)**2+rx*rx*(y-1)**2-rx*rx*ry*ry;
    while(y>=0){[plot(cx+x,cy+y),plot(cx-x,cy+y),plot(cx+x,cy-y),plot(cx-x,cy-y)];
      if(d2>0){y--;dy2-=2*rx*rx;d2+=rx*rx-dy2;}else{y--;x++;dx2+=2*ry*ry;dy2-=2*rx*rx;d2+=dx2-dy2+rx*rx;}}
  }
}
// パレット強制：ImageData の全ピクセルを量子化（パレットモード時のみ）
function quantizeImageData(id){
  if(A.cm==='full')return;// フルカラーは変換しない
  const d=id.data;
  for(let i=0;i<id.width*id.height;i++){
    if(d[i*4+3]<10)continue;// ほぼ透明はスキップ
    const hex=qColor(r2h(d[i*4],d[i*4+1],d[i*4+2]));
    const[r,g,b]=h2r(hex);
    d[i*4]=r;d[i*4+1]=g;d[i*4+2]=b;d[i*4+3]=255;// 完全不透明に
  }
}
function quantizeCtx(ctx,x,y,w,h){
  if(A.cm==='full')return;
  const id=ctx.getImageData(x,y,w,h);quantizeImageData(id);ctx.putImageData(id,x,y);
}

function applyGrad(x0,y0,x1,y1){
  const ctx=getCtx(),id=ctx.getImageData(0,0,A.w,A.h),d=id.data;
  const[r0,g0,b0]=h2r(qColor(A.fg)),[r1,g1,b1]=h2r(qColor(A.bg));
  const dx=x1-x0,dy=y1-y0,len2=dx*dx+dy*dy;
  for(let py=0;py<A.h;py++)for(let px=0;px<A.w;px++){
    if(!inSel(px,py))continue;
    let t=len2===0?0:((px-x0)*dx+(py-y0)*dy)/len2;
    if(A.gradTile)t=((t%1)+1)%1;else t=Math.max(0,Math.min(1,t));
    // 補間後にパレットへスナップ
    const interp=r2h(Math.round(r0+(r1-r0)*t),Math.round(g0+(g1-g0)*t),Math.round(b0+(b1-b0)*t));
    const[qr,qg,qb]=h2r(qColor(interp));
    const ii=(py*A.w+px)*4;d[ii]=qr;d[ii+1]=qg;d[ii+2]=qb;d[ii+3]=255;
  }
  ctx.putImageData(id,0,0);
}

// ===== Selection =====
function liftSel(){
  if(!A.sel)return;const l=A.layers[A.al];const{x,y,w,h}=A.sel;
  const data=l.ctx.getImageData(x,y,w,h);l.ctx.clearRect(x,y,w,h);A.float={x,y,data};pushHist();
}
function commitFloat(){
  if(!A.float)return;const l=A.layers[A.al];
  const t=document.createElement('canvas');t.width=A.float.data.width;t.height=A.float.data.height;
  t.getContext('2d').putImageData(A.float.data,0,0);
  l.ctx.drawImage(t,Math.round(A.float.x),Math.round(A.float.y));A.float=null;renderAll();
}

// ===== Copy / Paste =====
function doCopy(){
  const l=A.layers[A.al];
  const region=A.sel||{x:0,y:0,w:A.w,h:A.h};const{x,y,w,h}=region;
  const id=l.ctx.getImageData(x,y,w,h);clipboard={x,y,data:id};
  const tc2=document.createElement('canvas');tc2.width=w;tc2.height=h;tc2.getContext('2d').putImageData(id,0,0);
  tc2.toBlob(blob=>{try{navigator.clipboard.write([new ClipboardItem({'image/png':blob})]).catch(()=>{});}catch(e){}});
}
function doCut(){
  if(!A.sel)return;doCopy();const l=A.layers[A.al];const{x,y,w,h}=A.sel;
  pushHist();l.ctx.clearRect(x,y,w,h);renderAll();
}
async function doPaste(){
  try{
    const items=await navigator.clipboard.read();
    for(const item of items){if(item.types.includes('image/png')){
      const blob=await item.getType('image/png');const url=URL.createObjectURL(blob);const img=new Image();
      img.onload=()=>{
        const tc2=document.createElement('canvas');tc2.width=img.width;tc2.height=img.height;
        tc2.getContext('2d').drawImage(img,0,0);
        const id=tc2.getContext('2d').getImageData(0,0,img.width,img.height);
        quantizeImageData(id);// パレット外色を変換
        A.float={x:0,y:0,data:id};
        A.sel=null;pushHist();renderAll();URL.revokeObjectURL(url);
      };img.src=url;return;
    }}
  }catch(e){}
  if(clipboard){
    const id=new ImageData(new Uint8ClampedArray(clipboard.data.data),clipboard.data.width,clipboard.data.height);
    quantizeImageData(id);
    A.float={x:0,y:0,data:id};A.sel=null;pushHist();renderAll();
  }
}

// ===== Text =====
function placeText(px,py){
  const ta=document.getElementById('tbuf');
  const txt=(ta?.value||'').trim();if(!txt){alert('ツールオプションのテキスト欄に文字を入力してから配置してください。');return;}
  const ctx=getCtx();const opts=getTxtOpts();
  ctx.save();ctx.imageSmoothingEnabled=false;ctx.font=`${opts.size}px ${opts.font}`;ctx.textBaseline='top';
  const lines=txt.split('\n');
  if(opts.vert){
    let cx=px+opts.size;
    for(const line of lines){let cy=py;for(const ch of line){
      if(opts.outline){ctx.strokeStyle=opts.ocol;ctx.lineWidth=2;ctx.strokeText(ch,cx-opts.size,cy);}
      ctx.fillStyle=qColor(A.fg);ctx.fillText(ch,cx-opts.size,cy);cy+=opts.size;}cx+=opts.size;}
  } else {
    let lineY=py;
    for(const line of lines){
      if(opts.outline){ctx.strokeStyle=opts.ocol;ctx.lineWidth=2;ctx.strokeText(line,px,lineY);}
      ctx.fillStyle=qColor(A.fg);ctx.fillText(line,px,lineY);lineY+=opts.size+2;}
  }
  ctx.restore();
  // テキストのアンチエイリアスで生まれた中間色をパレットにスナップ
  quantizeCtx(ctx,0,0,A.w,A.h);
  pushHist();renderAll();
}
function getTxtOpts(){
  return{font:document.getElementById('tfont')?.value||'sans-serif',size:parseInt(document.getElementById('tsize')?.value||14),
         vert:document.getElementById('tvert')?.checked||false,outline:document.getElementById('tout')?.checked||false,
         ocol:document.getElementById('tocol')?.value||'#ffffff'};
}

// ===== Mouse =====
function sp(e){const r=mc.getBoundingClientRect();return[Math.floor((e.clientX-r.left)/A.zoom),Math.floor((e.clientY-r.top)/A.zoom)];}
function getAction(btn){return A.btnMap[btn]||'draw';}
function getCol(action){return action==='bg'?A.bg:A.fg;}

function mdDown(e){
  e.preventDefault();
  const[px,py]=sp(e);const action=getAction(e.button);const l=A.layers[A.al];
  if(action==='eyedrop'||e.altKey){const c=gpc(getCtx(),px,py);action==='bg'?setBg(c):setFg(c);return;}
  if(l.locked&&A.tool!=='sel'&&A.tool!=='move')return;
  A.drawing=true;A.sx=px;A.sy=py;A.lx=px;A.ly=py;
  const isErase=action==='erase';
  const col=qColor(getCol(action));const ctx=getCtx();
  if(isErase){pushHist();brush(ctx,px,py,'',true);renderAll();return;}
  if(A.tool==='pencil'){pushHist();brush(ctx,px,py,col,false);renderAll();}
  else if(A.tool==='eraser'){pushHist();brush(ctx,px,py,'',true);renderAll();}
  else if(A.tool==='fill'){pushHist();floodFill(ctx,px,py,col);renderAll();A.drawing=false;}
  else if(A.tool==='sel'){
    if(A.float)commitFloat();
    if(A.sel&&px>=A.sel.x&&px<A.sel.x+A.sel.w&&py>=A.sel.y&&py<A.sel.y+A.sel.h){A.selMoving=true;A.selOX=px-A.sel.x;A.selOY=py-A.sel.y;}
    else{A.sel={x:px,y:py,w:1,h:1};A.selMoving=false;}
  }
  else if(A.tool==='move'){
    if(A.float){A.selMoving=true;A.selOX=px-A.float.x;A.selOY=py-A.float.y;}
    else if(A.sel){liftSel();if(A.float){A.selMoving=true;A.selOX=px-A.float.x;A.selOY=py-A.float.y;}}
    else{
      // 選択なし → レイヤー全体を移動
      A.lyrMoving=true;A.lyrDX=0;A.lyrDY=0;
    }
  }
  else if(A.tool==='text'){placeText(px,py);A.drawing=false;}
}
function mdMove(e){
  const[px,py]=sp(e);
  document.getElementById('spos').textContent=`X:${px} Y:${py}`;
  if(inCV(px,py)){
    const colHex=gpc(A.layers[A.al].ctx,px,py);
    document.getElementById('scol').textContent='色:'+colHex;
    const pi=palIdxOf(colHex);
    if(pi!==palHoverIdx)updatePalHover(pi);
  }
  if(!A.drawing)return;
  // Detect which button is held (e.buttons bitmask: 1=left,2=right,4=middle)
  let action=A.btnMap[0];
  if(e.buttons===4)action=A.btnMap[1];
  else if(e.buttons===2)action=A.btnMap[2];
  const isErase=action==='erase';
  const col=qColor(getCol(action));const ctx=getCtx();
  const fill=document.getElementById('shfill')?.checked;
  if(isErase){bline(ctx,A.lx,A.ly,px,py,'',true);A.lx=px;A.ly=py;renderAll();}
  else if(A.tool==='pencil'){bline(ctx,A.lx,A.ly,px,py,col,false);A.lx=px;A.ly=py;renderAll();}
  else if(A.tool==='eraser'){bline(ctx,A.lx,A.ly,px,py,'',true);A.lx=px;A.ly=py;renderAll();}
  else if(A.tool==='line'||A.tool==='rect'||A.tool==='circle'||A.tool==='grad'){drawPreview(px,py,col,fill);}
  else if(A.tool==='sel'){
    if(A.selMoving&&A.sel){A.sel.x=px-A.selOX;A.sel.y=py-A.selOY;}
    else if(!A.selMoving){A.sel={x:Math.min(A.sx,px),y:Math.min(A.sy,py),w:Math.max(1,Math.abs(px-A.sx)+1),h:Math.max(1,Math.abs(py-A.sy)+1)};}
  }
  else if(A.tool==='move'){
    if(A.float&&A.selMoving){A.float.x=px-A.selOX;A.float.y=py-A.selOY;renderAll();}
    else if(A.lyrMoving){A.lyrDX=px-A.sx;A.lyrDY=py-A.sy;renderAll();}
  }
}
function drawPreview(px,py,col,fill){
  const z=A.zoom,cw=A.w*z,ch=A.h*z;octx.clearRect(0,0,cw,ch);
  if(A.tool==='grad'){octx.strokeStyle='rgba(255,255,255,0.7)';octx.lineWidth=1;octx.setLineDash([4,4]);octx.beginPath();octx.moveTo(A.sx*z+z/2,A.sy*z+z/2);octx.lineTo(px*z+z/2,py*z+z/2);octx.stroke();octx.setLineDash([]);return;}
  octx.strokeStyle=col;octx.fillStyle=col;octx.lineWidth=z;
  const x0=A.sx*z+z/2,y0=A.sy*z+z/2,x1=px*z+z/2,y1=py*z+z/2;
  if(A.tool==='line'){octx.beginPath();octx.moveTo(x0,y0);octx.lineTo(x1,y1);octx.stroke();}
  else if(A.tool==='rect'){const rx=Math.min(x0,x1)-z/2,ry=Math.min(y0,y1)-z/2,rw=Math.abs(x1-x0)+z,rh=Math.abs(y1-y0)+z;if(fill)octx.fillRect(rx,ry,rw,rh);else octx.strokeRect(rx+z/2,ry+z/2,rw-z,rh-z);}
  else if(A.tool==='circle'){const cx=(x0+x1)/2,cy=(y0+y1)/2,rx=Math.abs(x1-x0)/2+z/2,ry=Math.abs(y1-y0)/2+z/2;octx.beginPath();octx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);if(fill)octx.fill();else octx.stroke();}
  drawOverlay();
}
function mdUp(e){
  if(!A.drawing)return;const[px,py]=sp(e);const action=getAction(e.button);
  const isErase=action==='erase';const col=qColor(getCol(action));const ctx=getCtx();
  const fill=document.getElementById('shfill')?.checked;const cw=A.w*A.zoom,ch=A.h*A.zoom;
  if(isErase){A.drawing=false;return;}
  if(A.tool==='line'){pushHist();bline(ctx,A.sx,A.sy,px,py,col,false);octx.clearRect(0,0,cw,ch);renderAll();}
  else if(A.tool==='rect'){
    pushHist();const x0=Math.min(A.sx,px),y0=Math.min(A.sy,py),x1=Math.max(A.sx,px),y1=Math.max(A.sy,py);
    if(fill){for(let y=y0;y<=y1;y++)for(let x=x0;x<=x1;x++)spc(ctx,x,y,col);}
    else{for(let x=x0;x<=x1;x++){spc(ctx,x,y0,col);spc(ctx,x,y1,col);}for(let y=y0;y<=y1;y++){spc(ctx,x0,y,col);spc(ctx,x1,y,col);}}
    octx.clearRect(0,0,cw,ch);renderAll();
  } else if(A.tool==='circle'){
    pushHist();fillCircle(ctx,Math.round((A.sx+px)/2),Math.round((A.sy+py)/2),Math.round(Math.abs(px-A.sx)/2),Math.round(Math.abs(py-A.sy)/2),col,fill);
    octx.clearRect(0,0,cw,ch);renderAll();
  } else if(A.tool==='grad'){pushHist();applyGrad(A.sx,A.sy,px,py);octx.clearRect(0,0,cw,ch);renderAll();}
  else if(A.tool==='sel'){A.selMoving=false;if(A.sel&&A.sel.w<=1&&A.sel.h<=1)A.sel=null;}
  else if(A.tool==='move'){
    A.selMoving=false;
    if(A.lyrMoving&&(A.lyrDX!==0||A.lyrDY!==0)){
      // レイヤー全体をシフトしてコミット
      const l=A.layers[A.al];
      const c2=document.createElement('canvas');c2.width=A.w;c2.height=A.h;
      c2.getContext('2d').drawImage(l.canvas,A.lyrDX,A.lyrDY);
      l.ctx.clearRect(0,0,A.w,A.h);l.ctx.drawImage(c2,0,0);
      pushHist();
    }
    A.lyrMoving=false;A.lyrDX=0;A.lyrDY=0;
    renderAll();
  }
  A.drawing=false;
}

// ===== Color =====
// パレットモード時は色を量子化してからセット
function setFg(hex){
  if(!/^#[0-9a-fA-F]{6}$/.test(hex))return;
  const q=qColor(hex);A.fg=q;
  document.getElementById('fgb').style.background=q;
  document.getElementById('fghex').value=q;
  document.getElementById('fgp').value=q;
  const f=document.getElementById('fcv-fgb');if(f)f.style.background=q;
  updatePalHighlight();
}
function setBg(hex){
  if(!/^#[0-9a-fA-F]{6}$/.test(hex))return;
  const q=qColor(hex);A.bg=q;
  document.getElementById('bgb').style.background=q;
  document.getElementById('bghex').value=q;
  document.getElementById('bgp').value=q;
  const b=document.getElementById('fcv-bgb');if(b)b.style.background=q;
  updatePalHighlight();
}
function pickFg(){
  if(A.cm==='256'||A.cm==='16'){showPalPicker('fg');}
  else{document.getElementById('fgp').click();}
}
function pickBg(){
  if(A.cm==='256'||A.cm==='16'){showPalPicker('bg');}
  else{document.getElementById('bgp').click();}
}
// パレットから色を選ぶポップアップ
function showPalPicker(target){
  let pop=document.getElementById('palpicker');
  if(pop){pop.remove();return;}
  pop=document.createElement('div');
  pop.id='palpicker';
  pop.style.cssText='position:fixed;z-index:999;background:#222;border:1px solid #555;padding:6px;box-shadow:0 4px 16px #000a;border-radius:4px';
  const g=document.createElement('div');
  g.style.cssText='display:grid;grid-template-columns:repeat(16,18px);gap:1px';
  PAL.forEach(([r,gr,b])=>{
    const hex=r2h(r,gr,b);
    const c=document.createElement('div');
    c.style.cssText=`width:18px;height:18px;background:${hex};cursor:pointer;outline:1px solid #0004`;
    c.title=hex;
    c.onclick=()=>{
      if(target==='fg')setFg(hex);else setBg(hex);
      pop.remove();
    };
    g.appendChild(c);
  });
  pop.appendChild(g);
  // 閉じるボタン
  const close=document.createElement('div');
  close.textContent='✕ 閉じる';
  close.style.cssText='margin-top:5px;text-align:right;font-size:10px;color:#888;cursor:pointer';
  close.onclick=()=>pop.remove();
  pop.appendChild(close);
  document.body.appendChild(pop);
  // 画面中央に配置
  const W=pop.offsetWidth||300,H=pop.offsetHeight||200;
  pop.style.left=Math.max(0,(window.innerWidth-W)/2)+'px';
  pop.style.top=Math.max(0,(window.innerHeight-H)/2)+'px';
  // 外クリックで閉じる
  setTimeout(()=>document.addEventListener('click',function h(e){if(!pop.contains(e.target)){pop.remove();document.removeEventListener('click',h);}},true),10);
}
function swapColors(){const t=A.fg;setFg(A.bg);setBg(t);}

// パレット/カラーモード変更時に既存ピクセルも変換
function quantizeAllLayers(){
  A.layers.forEach(l=>{
    const id=l.ctx.getImageData(0,0,A.w,A.h);
    quantizeImageData(id);
    l.ctx.putImageData(id,0,0);
    // マスクは白黒なので変換不要
  });
}

function changeColorMode(m){
  A.cm=m;
  if(m==='256'){PAL=mkPal256();document.getElementById('palinfo').textContent='256色';}
  else if(m==='16'){PAL=mkPal16();document.getElementById('palinfo').textContent='16色';}
  document.getElementById('palsec').style.display=(m==='256'||m==='16')?'':'none';
  buildPalUI();
  // パレットモードに切り替えたら全レイヤーのピクセルを強制変換
  if(m==='256'||m==='16'){
    quantizeAllLayers();
    pushHist();
    renderAll();
  }
  // 描画色・背景色もパレットに合わせる
  setFg(A.fg);setBg(A.bg);
}
// ===== パレット選択・操作システム =====
function palIdxOf(hex){
  if(A.cm!=='256'&&A.cm!=='16')return -1;
  const[r,g,b]=h2r(hex);
  for(let i=0;i<PAL.length;i++)if(PAL[i][0]===r&&PAL[i][1]===g&&PAL[i][2]===b)return i;
  return -1;
}
function updatePalHighlight(){
  const g=document.getElementById('pgrid');if(!g)return;
  const cells=g.children;
  for(let i=0;i<cells.length;i++){
    cells[i].classList.toggle('pal-sel',!!(PAL_SEL&&i>=PAL_SEL.a&&i<=PAL_SEL.b));
    cells[i].classList.toggle('pal-swap',!!(palSwapSel&&i>=palSwapSel.a&&i<=palSwapSel.b));
  }
}
function updatePalHover(idx){
  if(idx===palHoverIdx)return;
  const g=document.getElementById('pgrid');if(!g)return;
  const cells=g.children;
  if(palHoverIdx>=0&&palHoverIdx<cells.length)cells[palHoverIdx].classList.remove('pal-hover');
  palHoverIdx=idx;
  if(idx>=0&&idx<cells.length)cells[idx].classList.add('pal-hover');
}
function showPalOps(){
  const el=document.getElementById('palops');
  if(el)el.style.display=PAL_SEL?'flex':'none';
}
function clearPalSel(){
  PAL_SEL=null;palMoveMode=false;
  const mb=document.getElementById('palmovebtn');if(mb)mb.classList.remove('on');
  const mh=document.getElementById('palmovehint');if(mh)mh.style.display='none';
  showPalOps();updatePalHighlight();
}
function togglePalFollow(){
  PAL_PIXEL_FOLLOW=!PAL_PIXEL_FOLLOW;
  const b=document.getElementById('palfollowbtn');
  if(b){b.textContent='追従'+(PAL_PIXEL_FOLLOW?'ON':'OFF');
    b.style.background=PAL_PIXEL_FOLLOW?'#3a5a3a':'#333';
    b.style.borderColor=PAL_PIXEL_FOLLOW?'#5a9a5a':'#555';
    b.style.color=PAL_PIXEL_FOLLOW?'#8f8':'#aaa';}
}
function togglePalSwapMode(){
  palMoveMode=!palMoveMode;
  palSwapSel=null;
  const mb=document.getElementById('palmovebtn');if(mb)mb.classList.toggle('on',palMoveMode);
  const mh=document.getElementById('palmovehint');if(mh)mh.style.display=palMoveMode?'':'none';
  updatePalHighlight();
}
// 複数色を一括置換（マップ：'r,g,b'→[r,g,b]）
function replaceColorsInLayers(colorMap){
  A.layers.forEach(l=>{
    const id=l.ctx.getImageData(0,0,A.w,A.h),d=id.data;
    for(let i=0;i<A.w*A.h;i++){
      if(d[i*4+3]<10)continue;
      const nr=colorMap.get(d[i*4]+','+d[i*4+1]+','+d[i*4+2]);
      if(nr){d[i*4]=nr[0];d[i*4+1]=nr[1];d[i*4+2]=nr[2];}
    }
    l.ctx.putImageData(id,0,0);
  });
  renderAll();
}
// グラデーション生成
function palGradient(){
  if(!PAL_SEL||PAL_SEL.b<=PAL_SEL.a){alert('2マス以上選択してください');return;}
  const{a,b}=PAL_SEL;
  const oldColors=[];for(let i=a;i<=b;i++)oldColors.push([...PAL[i]]);
  const[r0,g0,bl0]=PAL[a],[r1,g1,bl1]=PAL[b];const n=b-a;
  for(let i=0;i<=n;i++){
    const t=n===0?0:i/n;
    PAL[a+i]=[Math.round(r0+(r1-r0)*t),Math.round(g0+(g1-g0)*t),Math.round(bl0+(bl1-bl0)*t)];
  }
  if(PAL_PIXEL_FOLLOW){
    const map=new Map();
    for(let i=0;i<=n;i++){
      const oc=oldColors[i],nc=PAL[a+i];
      if(oc[0]!==nc[0]||oc[1]!==nc[1]||oc[2]!==nc[2])map.set(oc[0]+','+oc[1]+','+oc[2],nc);
    }
    if(map.size>0){pushHist();replaceColorsInLayers(map);}
  }
  buildPalUI();
}
// 色反転
function palInvert(){
  if(!PAL_SEL){alert('範囲を選択してください');return;}
  const{a,b}=PAL_SEL;
  const map=new Map();
  for(let i=a;i<=b;i++){
    const[r,g,bv]=PAL[i];const nr=[255-r,255-g,255-bv];
    if(PAL_PIXEL_FOLLOW)map.set(r+','+g+','+bv,nr);
    PAL[i]=nr;
  }
  if(PAL_PIXEL_FOLLOW&&map.size>0){pushHist();replaceColorsInLayers(map);}
  buildPalUI();renderAll();
}
// 中ドラッグ用: 選択範囲を指定位置へシフト移動
function doMovePalSel(targetIdx){
  if(!PAL_SEL)return;
  const{a,b}=PAL_SEL;const selLen=b-a+1;
  if(targetIdx>=a&&targetIdx<=b)return;
  const oldPAL=PAL.map(c=>[...c]);
  const selected=PAL.slice(a,b+1);
  const rest=[...PAL.slice(0,a),...PAL.slice(b+1)];
  let t=targetIdx<a?targetIdx:targetIdx-selLen;
  t=Math.max(0,Math.min(rest.length,t));
  const newPAL=[...rest.slice(0,t),...selected,...rest.slice(t)];
  if(PAL_PIXEL_FOLLOW){
    const map=new Map();
    for(let i=0;i<oldPAL.length;i++){
      const oc=oldPAL[i],nc=newPAL[i];
      if(oc[0]!==nc[0]||oc[1]!==nc[1]||oc[2]!==nc[2])map.set(oc[0]+','+oc[1]+','+oc[2],nc);
    }
    if(map.size>0){pushHist();replaceColorsInLayers(map);}
  }
  PAL=newPAL;
  PAL_SEL={a:t,b:t+selLen-1};
  buildPalUI();
}
// 差し替えボタン用: 2つの選択範囲の内容をスワップ
function doSwapPalRanges(src,dst){
  if(!src||!dst)return;
  const len=Math.min(src.b-src.a+1,dst.b-dst.a+1);
  // 重複チェック
  if(dst.a+len>src.a&&dst.a<src.a+len)return;
  const oldPAL=PAL.map(c=>[...c]);
  for(let i=0;i<len;i++){const tmp=PAL[src.a+i];PAL[src.a+i]=PAL[dst.a+i];PAL[dst.a+i]=tmp;}
  if(PAL_PIXEL_FOLLOW){
    const map=new Map();
    for(let i=0;i<oldPAL.length;i++){
      const oc=oldPAL[i],nc=PAL[i];
      if(oc[0]!==nc[0]||oc[1]!==nc[1]||oc[2]!==nc[2])map.set(oc[0]+','+oc[1]+','+oc[2],nc);
    }
    if(map.size>0){pushHist();replaceColorsInLayers(map);}
  }
  palMoveMode=false;palSwapSel=null;
  const mb=document.getElementById('palmovebtn');if(mb)mb.classList.remove('on');
  const mh=document.getElementById('palmovehint');if(mh)mh.style.display='none';
  buildPalUI();
}
// 2セルをスワップ（D&D用）
function swapPalCells(idxA,idxB){
  const[rA,gA,bA]=PAL[idxA],[rB,gB,bB]=PAL[idxB];
  const tmp=PAL[idxA];PAL[idxA]=PAL[idxB];PAL[idxB]=tmp;
  if(PAL_PIXEL_FOLLOW&&(rA!==rB||gA!==gB||bA!==bB)){
    const map=new Map();
    map.set(rA+','+gA+','+bA,[rB,gB,bB]);
    if(rA!==rB||gA!==gB||bA!==bB)map.set(rB+','+gB+','+bB,[rA,gA,bA]);
    // 同一色のスワップはスキップ
    const dA=rA+','+gA+','+bA,dB=rB+','+gB+','+bB;
    if(dA!==dB){
      // 2色同時置換（衝突防止のため1パスで処理済み）
      pushHist();
      A.layers.forEach(l=>{
        const id=l.ctx.getImageData(0,0,A.w,A.h),d=id.data;
        for(let i=0;i<A.w*A.h;i++){
          if(d[i*4+3]<10)continue;
          const r=d[i*4],g=d[i*4+1],b=d[i*4+2];
          if(r===rA&&g===gA&&b===bA){d[i*4]=rB;d[i*4+1]=gB;d[i*4+2]=bB;}
          else if(r===rB&&g===gB&&b===bB){d[i*4]=rA;d[i*4+1]=gA;d[i*4+2]=bA;}
        }
        l.ctx.putImageData(id,0,0);
      });
      renderAll();
    }
  }
}

function buildPalUI(){
  const g=document.getElementById('pgrid');g.innerHTML='';
  if(A.cm!=='256'&&A.cm!=='16')return;
  const cols=16;
  g.style.gridTemplateColumns=`repeat(${cols},1fr)`;

  PAL.forEach(([r,gr,b],idx)=>{
    const hex=r2h(r,gr,b);
    const c=document.createElement('div');
    c.className='pc';c.style.background=hex;
    c.title=hex+' #'+idx+'\n左クリック:描画色  右クリック:背景色\nダブルクリック:色変更  ドラッグ:範囲選択\nD&D(単色):スワップ';
    c.dataset.idx=idx;

    // マウスダウン: 差し替えモードなら差し替え先選択開始、通常は範囲選択開始
    c.addEventListener('mousedown',e=>{
      if(e.button===1){
        e.preventDefault();
        if(PAL_SEL&&idx>=PAL_SEL.a&&idx<=PAL_SEL.b){palMiddleDrag=true;palMiddleDragTarget=idx;}
        return;
      }
      if(e.button!==0)return;
      e.preventDefault();
      palMouseDown=true;palMouseDownIdx=idx;palMouseMoved=false;
      if(palMoveMode&&PAL_SEL){
        // 差し替えモード: 差し替え先の選択開始
        palSwapSel={a:idx,b:idx};
        updatePalHighlight();
      } else {
        PAL_SEL={a:idx,b:idx};
        palSwapSel=null;
        updatePalHighlight();showPalOps();
      }
    });
    // マウスオーバー: 選択範囲を拡張
    c.addEventListener('mouseover',()=>{
      if(palMiddleDrag){palMiddleDragTarget=idx;return;}
      if(!palMouseDown)return;
      const a=Math.min(palMouseDownIdx,idx),b=Math.max(palMouseDownIdx,idx);
      if(palMoveMode&&PAL_SEL){
        if(palSwapSel&&palSwapSel.a===a&&palSwapSel.b===b)return;
        palMouseMoved=true;palSwapSel={a,b};updatePalHighlight();
      } else {
        if(PAL_SEL&&PAL_SEL.a===a&&PAL_SEL.b===b)return;
        palMouseMoved=true;PAL_SEL={a,b};updatePalHighlight();showPalOps();
      }
    });
    // マウスアップ
    c.addEventListener('mouseup',e=>{
      if(e.button!==0||!palMouseDown)return;
      palMouseDown=false;
      if(palMoveMode&&PAL_SEL){
        // 差し替え実行
        if(palSwapSel)doSwapPalRanges(PAL_SEL,palSwapSel);
      } else {
        if(!palMouseMoved)setFg(hex);
      }
    });
    // 右クリック: 背景色セット
    c.addEventListener('contextmenu',e=>{e.preventDefault();setBg(hex);});
    // ダブルクリック: 色編集
    c.addEventListener('dblclick',e=>{
      e.stopPropagation();
      palEditIdx=idx;_palPrevHex='';
      const pe=document.getElementById('paledit');
      pe.value=r2h(r,gr,b);
      pe.style.left=e.clientX+'px';pe.style.top=e.clientY+'px';
      try{pe.showPicker();}catch(_){pe.click();}
    });
    // D&D: 単セルスワップ（追従ON時はピクセルも更新）
    c.draggable=true;
    c.addEventListener('dragstart',e=>{
      if(PAL_SEL&&PAL_SEL.a!==PAL_SEL.b)return;// 範囲選択中は無効
      e.dataTransfer.setData('text/plain',String(idx));
      c.classList.add('dragging');
    });
    c.addEventListener('dragend',()=>c.classList.remove('dragging'));
    c.addEventListener('dragover',e=>{e.preventDefault();c.classList.add('drag-over');});
    c.addEventListener('dragleave',()=>c.classList.remove('drag-over'));
    c.addEventListener('drop',e=>{
      e.preventDefault();c.classList.remove('drag-over');
      const src=parseInt(e.dataTransfer.getData('text/plain'));
      if(isNaN(src)||src===idx)return;
      swapPalCells(src,idx);
      buildPalUI();
    });

    g.appendChild(c);
  });
  updatePalHighlight();
}

// パレット内の特定色を新色に一括置換（履歴なし・プレビュー用）
function replacePalColorNoHist(oldHex,newHex){
  if(A.cm==='full')return;
  const[or,og,ob]=h2r(oldHex),[nr,ng,nb]=h2r(newHex);
  A.layers.forEach(l=>{
    const id=l.ctx.getImageData(0,0,A.w,A.h),d=id.data;
    for(let i=0;i<A.w*A.h;i++){
      if(d[i*4]===or&&d[i*4+1]===og&&d[i*4+2]===ob&&d[i*4+3]>0){
        d[i*4]=nr;d[i*4+1]=ng;d[i*4+2]=nb;
      }
    }
    l.ctx.putImageData(id,0,0);
  });
  renderAll();
}
// パレット内の特定色を新色に一括置換
function replacePalColor(oldHex,newHex){
  replacePalColorNoHist(oldHex,newHex);
  pushHist();
}

// パレット保存（JSON）
function savePalette(){
  const data={mode:A.cm,colors:PAL.map(([r,g,b])=>r2h(r,g,b))};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.download='palette.json';a.href=url;
  document.body.appendChild(a);a.click();

}

// パレット読込（JSON）
function loadPalette(input){
  const f=input.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(data.colors&&Array.isArray(data.colors)){
        const newPal=data.colors.map(hex=>h2r(hex));
        // モードに合わせてサイズを調整
        if(A.cm==='16')PAL=newPal.slice(0,16);
        else if(A.cm==='256'){PAL=newPal.slice(0,256);while(PAL.length<256)PAL.push([0,0,0]);}
        else PAL=newPal;
        buildPalUI();
        alert(`パレット読込完了: ${newPal.length}色`);
      }
    }catch(err){alert('読込エラー: '+err.message);}
    input.value='';
  };
  reader.readAsText(f);
}

function changeZoom(d){const ZS=[1,2,3,4,6,8,10,12,16,20,24,32,48,64];let i=ZS.indexOf(A.zoom);if(i===-1)i=ZS.reduce((best,v,j)=>Math.abs(v-A.zoom)<Math.abs(ZS[best]-A.zoom)?j:best,0);A.zoom=ZS[Math.max(0,Math.min(ZS.length-1,i+d))];initCV();}
function toggleGrid(){A.grid=!A.grid;document.getElementById('tb-grid').classList.toggle('on',A.grid);renderAll();}
function toggleSettings(e){e.stopPropagation();const d=document.getElementById('settingsdlg');d.style.display=d.style.display==='block'?'none':'block';}
document.addEventListener('click',e=>{const d=document.getElementById('settingsdlg');if(!d.contains(e.target)&&e.target.id!=='setbtn')d.style.display='none';});
document.addEventListener('mouseup',e=>{

  if(palMiddleDrag&&e.button===1){

// ===== Layers UI =====
function refreshLayers(){
  const el=document.getElementById('layers');el.innerHTML='';
  for(let i=A.layers.length-1;i>=0;i--){
    const l=A.layers[i];const div=document.createElement('div');div.className='li'+(i===A.al?' on':'');div.dataset.i=i;
    const th=document.createElement('canvas');th.className='lth';th.width=28;th.height=28;
    const tx=th.getContext('2d');tx.imageSmoothingEnabled=false;tx.drawImage(l.canvas,0,0,28,28);
    const nm=document.createElement('div');nm.className='ln';nm.textContent=l.name;
    nm.ondblclick=()=>{const n=prompt('レイヤー名:',l.name);if(n){l.name=n;refreshLayers();}};
    const vis=document.createElement('span');vis.className='lic';vis.textContent=l.vis?'👁':'·';vis.onclick=e=>{e.stopPropagation();l.vis=!l.vis;refreshLayers();renderAll();};
    const lk=document.createElement('span');lk.className='lic';lk.textContent=l.locked?'🔒':'🔓';lk.onclick=e=>{e.stopPropagation();l.locked=!l.locked;refreshLayers();};
    const mk=document.createElement('span');mk.className='lic';mk.textContent=l.mask?'🎭':'·';mk.style.color=l.mask?'#f8c':undefined;
    div.append(th,nm,vis,lk,mk);
    div.onclick=()=>{
      A.al=i;
      const op=Math.round(l.opacity*100);
      document.getElementById('lopac').value=op;
      document.getElementById('lopacv').textContent=op+'%';
      document.getElementById('lblend').value=l.blendMode||'normal';

      refreshLayers();
    };
    el.appendChild(div);
  }
}
function updateThumbs(){
  document.querySelectorAll('.li').forEach(el=>{
    const i=parseInt(el.dataset.i),l=A.layers[i];if(!l)return;
    const th=el.querySelector('.lth');if(!th)return;const tx=th.getContext('2d');tx.clearRect(0,0,28,28);tx.imageSmoothingEnabled=false;
    const AR=A.w/A.h,TW=AR>1?28:Math.round(28*AR),TH=AR<1?28:Math.round(28/AR);
    tx.drawImage(l.canvas,Math.round((28-TW)/2),Math.round((28-TH)/2),TW,TH);
  });
}

// ===== History =====
function pushHist(){
  const snap=A.layers.map(l=>{const c=document.createElement('canvas');c.width=A.w;c.height=A.h;c.getContext('2d').drawImage(l.canvas,0,0);return{canvas:c,name:l.name,vis:l.vis,locked:l.locked,opacity:l.opacity,blendMode:l.blendMode||'normal'};});
  A.hist=A.hist.slice(0,A.hidx+1);A.hist.push({layers:snap,al:A.al});A.hidx=A.hist.length-1;
  if(A.hist.length>60){A.hist.shift();A.hidx--;}
}
function restoreHist(snap){
  A.layers=snap.layers.map(s=>{const l=mkLayer(s.name);l.ctx.drawImage(s.canvas,0,0);l.vis=s.vis;l.locked=s.locked;l.opacity=s.opacity;l.blendMode=s.blendMode||'normal';return l;});
  A.al=snap.al;refreshLayers();renderAll();
}
function doUndo(){if(A.hidx>0){A.hidx--;restoreHist(A.hist[A.hidx]);}}
function doRedo(){if(A.hidx<A.hist.length-1){A.hidx++;restoreHist(A.hist[A.hidx]);}}

// ===== New / Resize / Export =====
function doNew(){
  const w=parseInt(document.getElementById('wi').value),h=parseInt(document.getElementById('hi').value);
  if(!w||!h)return;
  A.w=w;A.h=h;A.layers=[];A.al=0;A.sel=null;A.float=null;A.hist=[];A.hidx=-1;
  const bg=mkLayer('背景');bg.ctx.fillStyle='#fff';bg.ctx.fillRect(0,0,w,h);
  const l1=mkLayer('レイヤー 1');A.layers=[bg,l1];A.al=1;refreshLayers();initCV();pushHist();
}
function doResize(){
  const nw=parseInt(document.getElementById('wi').value),nh=parseInt(document.getElementById('hi').value);
  if(!nw||!nh)return;
  A.layers.forEach(l=>{const c2=document.createElement('canvas');c2.width=nw;c2.height=nh;c2.getContext('2d').drawImage(l.canvas,0,0);l.canvas=c2;l.ctx=c2.getContext('2d');
    if(l.mask){const m2=document.createElement('canvas');m2.width=nw;m2.height=nh;m2.getContext('2d').drawImage(l.mask,0,0);l.mask=m2;}});
  A.w=nw;A.h=nh;initCV();pushHist();
}
function doExport(){
  const flat=document.createElement('canvas');flat.width=A.w;flat.height=A.h;const fx=flat.getContext('2d');
  A.layers.forEach(l=>{if(!l.vis)return;fx.save();fx.globalAlpha=l.opacity;
    if(l.mask){const t=document.createElement('canvas');t.width=A.w;t.height=A.h;const tx=t.getContext('2d');tx.drawImage(l.canvas,0,0);tx.globalCompositeOperation='destination-in';tx.drawImage(l.mask,0,0);fx.drawImage(t,0,0);}
    else fx.drawImage(l.canvas,0,0);fx.restore();});
  flat.toBlob(blob=>{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='pixel_art.png';
    document.body.appendChild(a);a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},200);
  },'image/png');
}

// ===== プロジェクト保存 (.dotpix / JSON) =====
function doSaveProject(){
  const layerData=A.layers.map(l=>{
    const obj={
      name:l.name,visible:l.vis,locked:l.locked,opacity:l.opacity,
      blendMode:l.blendMode||'normal',
      data:l.canvas.toDataURL('image/png'),
      mask:l.mask?l.mask.toDataURL('image/png'):null
    };
    return obj;
  });
  const proj={
    version:1,
    width:A.w,height:A.h,
    colorMode:A.cm,
    palette:PAL.map(([r,g,b])=>r2h(r,g,b)),
    activeLayer:A.al,
    layers:layerData
  };
  const blob=new Blob([JSON.stringify(proj)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.download='project.dotpix';a.href=url;
  document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},200);
}

function doLoadProject(input){
  const f=input.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      const proj=JSON.parse(e.target.result);
      if(!proj.version||!proj.layers)throw new Error('無効なファイル形式です');

      // サイズ・カラーモード復元
      A.w=proj.width;A.h=proj.height;
      document.getElementById('wi').value=A.w;
      document.getElementById('hi').value=A.h;

      // パレット復元
      if(proj.palette&&Array.isArray(proj.palette)){
        PAL=proj.palette.map(h=>h2r(h));
      }

      // カラーモード復元（ピクセル変換なし）
      A.cm=proj.colorMode||'full';
      document.getElementById('cmsel').value=A.cm;
      document.getElementById('palinfo').textContent=
        A.cm==='16'?'16色':A.cm==='256'?'256色':A.cm==='65535'?'65535色':'フルカラー';
      document.getElementById('palsec').style.display=(A.cm==='256'||A.cm==='16')?'':'none';
      buildPalUI();

      // レイヤー復元（各 data URL を Image 経由でキャンバスへ）
      const loadImg=url=>new Promise(res=>{
        const img=new Image();img.onload=()=>res(img);img.src=url;
      });

      A.layers=[];
      for(const ld of proj.layers){
        const l=mkLayer(ld.name);
        l.vis=ld.visible;l.locked=ld.locked;l.opacity=ld.opacity;l.blendMode=ld.blendMode||'normal';
        const img=await loadImg(ld.data);
        l.ctx.drawImage(img,0,0);
        if(ld.mask){
          const mc2=document.createElement('canvas');mc2.width=A.w;mc2.height=A.h;
          const mimg=await loadImg(ld.mask);
          mc2.getContext('2d').drawImage(mimg,0,0);
          l.mask=mc2;
        }
        A.layers.push(l);
      }
      A.al=Math.min(proj.activeLayer||0,A.layers.length-1);
      A.sel=null;A.float=null;A.hist=[];A.hidx=-1;
      refreshLayers();initCV();pushHist();
    }catch(err){alert('読込エラー: '+err.message);}
    input.value='';
  };
  reader.readAsText(f);
}

// ===== フレーム管理 =====
function snapLayers(){
  return A.layers.map(l=>{
    const c=document.createElement('canvas');c.width=A.w;c.height=A.h;
    c.getContext('2d').drawImage(l.canvas,0,0);
    let mk=null;
    if(l.mask){mk=document.createElement('canvas');mk.width=A.w;mk.height=A.h;mk.getContext('2d').drawImage(l.mask,0,0);}
    return{name:l.name,vis:l.vis,locked:l.locked,opacity:l.opacity,blendMode:l.blendMode||'normal',canvas:c,ctx:c.getContext('2d'),mask:mk};
  });
}
function restoreLayersFromSnap(snap){
  A.layers=snap.map(s=>{
    const l=mkLayer(s.name);l.ctx.drawImage(s.canvas,0,0);
    l.vis=s.vis;l.locked=s.locked;l.opacity=s.opacity;l.blendMode=s.blendMode||'normal';
    if(s.mask){const mk=document.createElement('canvas');mk.width=A.w;mk.height=A.h;mk.getContext('2d').drawImage(s.mask,0,0);l.mask=mk;}
    return l;
  });
  A.al=Math.min(A.al,A.layers.length-1);
}
function saveCurrentFrame(){
  if(!A.frames||!A.frames.length)return;
  A.frames[A.frameIdx].layers=snapLayers();
}
function switchFrame(idx){
  if(idx===A.frameIdx||A.playing)return;
  saveCurrentFrame();
  A.frameIdx=idx;
  restoreLayersFromSnap(A.frames[idx].layers);
  A.hist=[];A.hidx=-1;pushHist();
  refreshLayers();renderAll();refreshFrameBar();
}
function initFrames(){
  A.frames=[{layers:snapLayers(),delay:100}];
  A.frameIdx=0;
  refreshFrameBar();
}
function addFrame(){
  if(A.playing)return;
  saveCurrentFrame();
  const nf={layers:snapLayers(),delay:A.frames[A.frameIdx]?.delay||100};
  A.frames.splice(A.frameIdx+1,0,nf);
  A.frameIdx++;
  restoreLayersFromSnap(A.frames[A.frameIdx].layers);
  A.hist=[];A.hidx=-1;pushHist();
  refreshLayers();renderAll();refreshFrameBar();
}
function delFrame(){
  if(A.playing||A.frames.length<=1)return;
  A.frames.splice(A.frameIdx,1);
  A.frameIdx=Math.min(A.frameIdx,A.frames.length-1);
  restoreLayersFromSnap(A.frames[A.frameIdx].layers);
  A.hist=[];A.hidx=-1;pushHist();
  refreshLayers();renderAll();refreshFrameBar();
}
function dupFrame(){
  if(A.playing)return;
  saveCurrentFrame();
  const copy={layers:snapLayers(),delay:A.frames[A.frameIdx].delay};
  A.frames.splice(A.frameIdx+1,0,copy);
  A.frameIdx++;
  A.hist=[];A.hidx=-1;pushHist();
  refreshLayers();renderAll();refreshFrameBar();
}
let _playTimer=null;
function togglePlay(){
  if(A.playing){
    A.playing=false;clearTimeout(_playTimer);_playTimer=null;
    document.getElementById('playbtn').textContent='▶ 再生';
    A.frameIdx=0;
    restoreLayersFromSnap(A.frames[0].layers);
    refreshLayers();renderAll();refreshFrameBar();
  } else {
    saveCurrentFrame();
    A.playing=true;
    document.getElementById('playbtn').textContent='⏹ 停止';
    let fi=0;
    const step=()=>{
      if(!A.playing)return;
      fi=fi%A.frames.length;A.frameIdx=fi;
      restoreLayersFromSnap(A.frames[fi].layers);
      renderAll();refreshFrameBar();fi++;
      _playTimer=setTimeout(step,A.frames[A.frameIdx].delay||100);
    };
    step();
  }
}
function refreshFrameBar(){
  const el=document.getElementById('framelist');if(!el)return;
  el.innerHTML='';
  A.frames.forEach((fr,i)=>{
    const isCur=i===A.frameIdx;
    const item=document.createElement('div');
    item.style.cssText=`display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:3px;border-radius:4px;border:2px solid ${isCur?'#7af':'#444'};background:${isCur?'#1e2d40':'transparent'};flex-shrink:0`;
    if(!A.playing)item.onclick=()=>switchFrame(i);
    const tc=document.createElement('canvas');tc.width=48;tc.height=48;
    tc.style.cssText='image-rendering:pixelated;display:block;background:repeating-conic-gradient(#555 0% 25%,#333 0% 50%) 0 0/6px 6px';
    const tx=tc.getContext('2d');tx.imageSmoothingEnabled=false;
    {const AR=A.w/A.h,TW=AR>1?48:Math.round(48*AR),TH=AR<1?48:Math.round(48/AR);
    flattenToCtx(fr.layers,tx,TW,TH,Math.round((48-TW)/2),Math.round((48-TH)/2));}
    const num=document.createElement('div');
    num.textContent=i+1;
    num.style.cssText=`font-size:9px;color:${isCur?'#7af':'#888'}`;
    const di=document.createElement('input');
    di.type='number';di.value=fr.delay||100;di.min=10;di.max=9999;
    di.style.cssText='width:46px;font-size:9px;background:#2a2a2a;border:1px solid #555;color:#ccc;border-radius:2px;padding:1px 2px;text-align:center';
    di.title='表示時間(ms)';di.onclick=e=>e.stopPropagation();
    di.oninput=e=>{fr.delay=Math.max(10,parseInt(e.target.value)||100);};
    item.append(tc,num,di);el.appendChild(item);
  });
}
function flattenToCtx(layers,tx,tw,th,ox=0,oy=0){
  layers.forEach(l=>{
    if(!l.vis)return;tx.save();tx.globalAlpha=l.opacity;
    const bm=l.blendMode||'normal';
    tx.globalCompositeOperation=bm==='add'?'lighter':bm==='screen'?'screen':bm==='multiply'?'multiply':'source-over';
    if(l.mask){
      const t=document.createElement('canvas');t.width=A.w;t.height=A.h;
      const ttx=t.getContext('2d');ttx.drawImage(l.canvas,0,0);ttx.globalCompositeOperation='destination-in';ttx.drawImage(l.mask,0,0);
      tx.drawImage(t,ox,oy,tw,th);
    } else tx.drawImage(l.canvas,ox,oy,tw,th);
    tx.restore();
  });
}
function updateFrameThumb(){
  const el=document.getElementById('framelist');if(!el||!A.frames.length)return;
  const items=el.children;if(!items[A.frameIdx])return;
  const tc=items[A.frameIdx].querySelector('canvas');if(!tc)return;
  const tx=tc.getContext('2d');tx.clearRect(0,0,48,48);tx.imageSmoothingEnabled=false;
  const AR=A.w/A.h,TW=AR>1?48:Math.round(48*AR),TH=AR<1?48:Math.round(48/AR);
  flattenToCtx(A.layers,tx,TW,TH,Math.round((48-TW)/2),Math.round((48-TH)/2));
}

// ===== GIF エンコーダ =====
function gifLZWEncode(pixels,minCodeSize){
  const cc=1<<minCodeSize,eoi=cc+1;
  const out=[];let buf=0,bufsz=0,cs=minCodeSize+1,nc=eoi+1;
  const tbl=new Map();
  const reset=()=>{tbl.clear();for(let i=0;i<cc;i++)tbl.set(String(i),i);nc=eoi+1;cs=minCodeSize+1;};
  const emit=c=>{buf|=c<<bufsz;bufsz+=cs;while(bufsz>=8){out.push(buf&255);buf>>>=8;bufsz-=8;}};
  reset();emit(cc);
  let s=String(pixels[0]);
  for(let i=1;i<pixels.length;i++){
    const ns=s+'|'+pixels[i];
    if(tbl.has(ns)){s=ns;}
    else{
      emit(tbl.get(s));
      if(nc<4096){tbl.set(ns,nc++);if(nc>(1<<cs)&&cs<12)cs++;}
      else{emit(cc);reset();}
      s=String(pixels[i]);
    }
  }
  emit(tbl.get(s));emit(eoi);
  if(bufsz>0)out.push(buf&255);
  return out;
}
function buildGIF(framePixels,w,h,pal,delays){
  let pb=1;while((1<<pb)<pal.length)pb++;if(pb<1)pb=1;
  const ps=1<<pb,fp=[...pal];while(fp.length<ps)fp.push([0,0,0]);
  const b=[],w16=v=>{b.push(v&255);b.push((v>>8)&255);},str=s=>{for(const c of s)b.push(c.charCodeAt(0));},by=v=>b.push(v&255);
  str('GIF89a');w16(w);w16(h);by(0x80|(pb-1));by(0);by(0);
  for(const[r,g,bv]of fp){by(r);by(g);by(bv);}
  by(0x21);by(0xff);by(11);str('NETSCAPE2.0');by(3);by(1);w16(0);by(0);
  const mcs=Math.max(2,pb);
  for(let f=0;f<framePixels.length;f++){
    const dl=Math.max(2,Math.round((delays[f]||100)/10));
    by(0x21);by(0xf9);by(4);by(0x04);w16(dl);by(0);by(0);
    by(0x2c);w16(0);w16(0);w16(w);w16(h);by(0);
    by(mcs);
    const lzw=gifLZWEncode(framePixels[f],mcs);
    let i=0;while(i<lzw.length){const n=Math.min(255,lzw.length-i);by(n);for(let j=0;j<n;j++)by(lzw[i++]);}
    by(0);
  }
  by(0x3b);return new Uint8Array(b);
}
function flattenFrame(layers){
  const flat=document.createElement('canvas');flat.width=A.w;flat.height=A.h;
  const fx=flat.getContext('2d');flattenToCtx(layers,fx,A.w,A.h);
  return fx.getImageData(0,0,A.w,A.h);
}
function pixelsToIndices(imgData,pal){
  const d=imgData.data,out=new Uint8Array(A.w*A.h);
  for(let i=0;i<A.w*A.h;i++){
    if(d[i*4+3]<10){out[i]=0;continue;}
    const r=d[i*4],g=d[i*4+1],bv=d[i*4+2];
    let best=0,bd=1e9;
    pal.forEach(([pr,pg,pb],pi)=>{const dd=(r-pr)**2+(g-pg)**2+(bv-pb)**2;if(dd<bd){bd=dd;best=pi;}});
    out[i]=best;
  }
  return out;
}
function doExportGIF(){
  saveCurrentFrame();
  let gifPal;
  if(A.cm==='16')gifPal=[...PAL];
  else if(A.cm==='256')gifPal=[...PAL];
  else gifPal=mkPal256();
  const pb=A.cm==='16'?4:8;
  const ps=1<<pb;while(gifPal.length<ps)gifPal.push([0,0,0]);
  const framePixels=A.frames.map(fr=>pixelsToIndices(flattenFrame(fr.layers),gifPal));
  const delays=A.frames.map(fr=>fr.delay||100);
  const gif=buildGIF(framePixels,A.w,A.h,gifPal,delays);
  const blob=new Blob([gif],{type:'image/gif'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.download='animation.gif';a.href=url;
  document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},200);
}

document.addEventListener('keydown',e=>{
  const active=document.activeElement;
  if(active&&(active.tagName==='INPUT'||active.tagName==='TEXTAREA'||active.tagName==='SELECT'))return;
  const ctrl=e.ctrlKey||e.metaKey;
  if(ctrl){
    if(e.key.toLowerCase()==='z'){e.preventDefault();doUndo();return;}
    if(e.key.toLowerCase()==='y'||e.key==='Z'){e.preventDefault();doRedo();return;}
    if(e.key.toLowerCase()==='a'){e.preventDefault();A.sel={x:0,y:0,w:A.w,h:A.h};return;}
    if(e.key.toLowerCase()==='d'){e.preventDefault();A.sel=null;renderAll();return;}
    if(e.key.toLowerCase()==='c'){e.preventDefault();doCopy();return;}
    if(e.key.toLowerCase()==='x'){e.preventDefault();doCut();return;}
    if(e.key.toLowerCase()==='v'){e.preventDefault();doPaste();return;}
  }
  if(e.key==='Escape'){if(A.float)commitFloat();A.sel=null;renderAll();return;}
  if((e.key==='Delete'||e.key==='Backspace')&&A.sel){
    e.preventDefault();const l=A.layers[A.al];
    if(!l.locked){pushHist();const{x,y,w,h}=A.sel;l.ctx.clearRect(x,y,w,h);renderAll();}return;
  }
  // [ / 「 = brush size +1,  ] / 」 = brush size -1
  if(e.code==='BracketLeft'||e.key==='['||e.key==='「'){e.preventDefault();changeBrushSize(1);return;}
  if(e.code==='BracketRight'||e.key===']'||e.key==='」'){e.preventDefault();changeBrushSize(-1);return;}
  const km={p:'pencil',e:'eraser',f:'fill',l:'line',r:'rect',c:'circle',g:'grad',s:'sel',v:'move',t:'text'};
  if(!ctrl&&km[e.key.toLowerCase()])setTool(km[e.key.toLowerCase()]);
});

// ===== Init =====
function init(){
  A.cm='256';PAL=mkPal256();
  document.getElementById('palinfo').textContent='256色';
  document.getElementById('palsec').style.display='';
  buildPalUI();
  A.fg='#000000';A.bg='#ffffff';
  document.getElementById('fgb').style.background='#000000';document.getElementById('fghex').value='#000000';document.getElementById('fgp').value='#000000';
  document.getElementById('bgb').style.background='#ffffff';document.getElementById('bghex').value='#ffffff';document.getElementById('bgp').value='#ffffff';
  setTool('pencil');updateToolOpts();A.w=32;A.h=32;A.layers=[];
  const bg=mkLayer('背景');bg.ctx.fillStyle='#fff';bg.ctx.fillRect(0,0,32,32);
  const l1=mkLayer('レイヤー 1');A.layers=[bg,l1];A.al=1;
  refreshLayers();initCV();pushHist();
  initFrames();
}
init();
